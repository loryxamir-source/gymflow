<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="GymFlow" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#ffffff" />
<link rel="apple-touch-icon" href="data:image/png;base64,{{ICON_BASE64}}" />
<link rel="icon" href="data:image/png;base64,{{ICON_BASE64}}" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>GymFlow</title>
<style>
@font-face {
  font-family: 'LuckiestGuy';
  src: url(data:font/ttf;base64,{{FONT_BASE64}}) format('truetype');
  font-weight: normal;
  font-style: normal;
}

:root {
  --bg-page: #ffffff;
  --bg-surface: #f2f2f7;
  --bg-surface-alt: #f8f8fa;
  --bg-track: #eceef2;
  --bg-card: #ffffff;
  --text-primary: #1c1c1e;
  --text-secondary: #8e8e93;
  --border-color: #eee;
  --border-strong: #e5e5ea;
  --input-border: #d0d0d5;
  --muted-bg: #ffe5e5;
}
:root[data-theme="dark"] {
  --bg-page: #000000;
  --bg-surface: #1c1c1e;
  --bg-surface-alt: #202024;
  --bg-track: #2c2c2e;
  --bg-card: #1c1c1e;
  --text-primary: #f2f2f7;
  --text-secondary: #9a9aa0;
  --border-color: #2c2c2e;
  --border-strong: #38383a;
  --input-border: #48484a;
  --muted-bg: #3a1f1f;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg-page: #000000;
    --bg-surface: #1c1c1e;
    --bg-surface-alt: #202024;
    --bg-track: #2c2c2e;
    --bg-card: #1c1c1e;
    --text-primary: #f2f2f7;
    --text-secondary: #9a9aa0;
    --border-color: #2c2c2e;
    --border-strong: #38383a;
    --input-border: #48484a;
    --muted-bg: #3a1f1f;
  }
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  background: var(--bg-page);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  display: flex;
  flex-direction: column;
  /* 100vh / -webkit-fill-available are unreliable on real mobile Safari (can
     resolve to 0 or the wrong value depending on device/OS), which cascades
     into every flex/overflow child below never getting real height. --app-vh
     is set from JS using the actual measured window.innerHeight and always
     wins when supported, sidestepping the ambiguity entirely. */
  height: 100vh;
  height: -webkit-fill-available;
  height: var(--app-vh, 100vh);
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  position: relative;
}

#bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url(data:image/jpeg;base64,{{BG_BASE64}});
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}

#app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; }

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px 0 14px;
}

.clock-box { display: flex; flex-direction: column; align-items: flex-start; }
.clock-text { font-family: 'LuckiestGuy'; font-weight: bold; font-size: 22px; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.clock-label { font-size: 11px; color: var(--text-secondary); font-weight: bold; margin-top: -2px; }

.top-bar-buttons { display: flex; align-items: center; gap: 10px; }
.icon-btn {
  width: 42px; height: 42px; border-radius: 21px;
  background: var(--bg-surface); display: flex; align-items: center; justify-content: center;
  font-size: 20px; border: none; font-weight: bold;
}
.icon-btn.muted { background: var(--muted-bg); }

.title {
  font-family: 'LuckiestGuy'; font-weight: bold; font-size: 28px;
  text-align: center; margin: 12px 0 4px 0; color: var(--text-primary);
}

.week-bar {
  display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px;
}
.week-range-text { font-family: 'LuckiestGuy'; font-weight: bold; font-size: 14px; color: var(--text-primary); }
.week-dates-text { font-size: 12px; color: var(--text-secondary); font-weight: bold; }
.week-reset-text { font-size: 12px; color: #007aff; font-weight: bold; background: none; border: none; }

.week-arrow {
  flex: 0 0 auto;
  width: 22px; height: 22px; border-radius: 11px;
  background: rgba(0,0,0,0.35); color: #fff; font-size: 13px; font-weight: bold;
  display: flex; align-items: center; justify-content: center; border: none;
}

.tab-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; min-height: 0; }

.edit-slots-btn-row { display: flex; justify-content: center; margin-bottom: 6px; }
.edit-slots-btn { font-size: 12px; color: #007aff; font-weight: bold; background: none; border: none; }

.backup-btn-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 6px; }

/* iOS Safari (even outside the installed PWA) fails to make an overflow-y:auto
   flex child scrollable if its height comes purely from flex-grow — it needs a
   concretely-sized box. Absolute-position the scrollable list inside a
   position:relative flex:1 wrapper instead of relying on flex sizing alone. */
.list-wrap { flex: 1; position: relative; overflow: hidden; width: 100%; min-height: 0; }
.slot-list, .payouts-list, .members-list, .stats-tab-list {
  position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  width: 100%; padding: 0 12px 10px 12px;
}

.pull-indicator {
  height: 0; overflow: hidden; display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--text-secondary); font-weight: bold; text-align: center;
}

.slot-row { display: flex; align-items: center; gap: 6px; padding: 6px 0; border-bottom: 1px solid var(--border-color); }
.slot-time { width: 46px; font-family: 'LuckiestGuy'; font-weight: bold; font-size: 12px; color: var(--text-primary); flex: 0 0 auto; }
.slot-cell {
  flex: 1; min-width: 0; padding: 10px 8px; border-radius: 8px; background: var(--bg-surface); border: none;
  font-family: 'LuckiestGuy'; font-weight: bold; font-size: 11px; color: var(--text-secondary); text-align: center;
}
.slot-cell.filled { background: #007aff; color: #fff; }
.slot-cell.completed { background: #34c759; color: #fff; }

.member-toggle-list { max-height: 46vh; overflow-y: auto; -webkit-overflow-scrolling: touch; margin-bottom: 8px; }
.member-toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 6px; border-bottom: 1px solid var(--border-color); }
.member-toggle-row:last-child { border-bottom: none; }
.member-toggle-name { font-family: 'LuckiestGuy'; font-weight: bold; font-size: 14px; color: var(--text-primary); }
.member-toggle-check { font-size: 18px; font-weight: bold; color: #007aff; width: 24px; text-align: center; }

.member-note-row {
  display: flex; align-items: center; gap: 6px; padding: 2px 6px 10px 6px; margin-top: -6px;
  border-bottom: 1px solid var(--border-color); cursor: pointer;
}
.member-note-row:last-child { border-bottom: none; }
.member-note-icon { font-size: 12px; }
.member-note-text { font-size: 11px; color: var(--text-secondary); font-weight: bold; flex: 1; text-align: left; }

.note-textarea {
  width: 100%; min-height: 80px; border: 1px solid var(--input-border); border-radius: 8px; padding: 8px;
  font-size: 14px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin-bottom: 12px; resize: vertical;
  background: var(--bg-card); color: var(--text-primary);
}

.slots-manage-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid var(--border-color); }
.slots-manage-time { font-weight: bold; font-family: 'LuckiestGuy'; font-size: 13px; color: var(--text-primary); }
.slots-remove-btn { color: #ff3b30; font-weight: bold; background: none; border: none; font-size: 18px; }
.slots-manage-list { max-height: 220px; overflow-y: auto; }
.slots-add-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; justify-content: center; }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  display: none; align-items: center; justify-content: center; z-index: 100;
}
.modal-overlay.open { display: flex; }
.modal-card { background: var(--bg-card); color: var(--text-primary); border-radius: 14px; padding: 16px; width: 82%; max-width: 320px; }
.modal-title { font-family: 'LuckiestGuy'; font-weight: bold; font-size: 15px; text-align: center; margin-bottom: 12px; color: var(--text-secondary); }

.time-select-row { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 12px; }
.time-select-row select { font-size: 24px; padding: 8px; border-radius: 8px; border: 1px solid var(--input-border); font-weight: bold; background: var(--bg-card); color: var(--text-primary); }
.time-select-row .colon { font-size: 24px; font-weight: bold; }

.stats-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 4px; border-bottom: 1px solid var(--border-color); }
.stats-row:last-child { border-bottom: none; margin-bottom: 4px; }
.stats-row.member-row { cursor: pointer; }
.stats-month { font-family: 'LuckiestGuy'; font-weight: bold; font-size: 13px; color: var(--text-primary); }
.stats-tag { font-size: 10px; color: var(--text-secondary); font-weight: bold; margin-top: 1px; }
.stats-count { font-family: 'LuckiestGuy'; font-weight: bold; font-size: 18px; color: #007aff; }
.stats-count .cur { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

.payout-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.paid-btn {
  font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 12px; border: none;
  background: var(--bg-surface); color: #007aff;
}
.paid-btn.paid { background: #34c759; color: #fff; }

.revenue-card {
  display: flex; align-items: center; justify-content: space-between; background: var(--bg-surface);
  border-radius: 10px; padding: 12px 14px; margin: 0 0 8px 0;
}
.revenue-label { font-size: 12px; color: var(--text-secondary); font-weight: bold; }
.revenue-amount { font-family: 'LuckiestGuy'; font-weight: bold; font-size: 20px; color: #34c759; }
.revenue-amount .cur { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

.attendance-card { background: var(--bg-surface-alt); border-radius: 10px; padding: 10px 14px; margin: 0 0 8px 0; }
.attendance-title { font-size: 12px; color: var(--text-secondary); font-weight: bold; margin-bottom: 6px; }
.attendance-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
.attendance-rank { width: 22px; font-size: 13px; font-weight: bold; text-align: center; flex: 0 0 auto; }
.attendance-name { flex: 1; font-family: 'LuckiestGuy'; font-weight: bold; font-size: 13px; color: var(--text-primary); }
.attendance-count { font-size: 11px; color: var(--text-secondary); font-weight: bold; }

.busiest-card { background: var(--bg-surface-alt); border-radius: 10px; padding: 10px 14px; margin: 0 0 8px 0; }
.busiest-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
.busiest-day { width: 34px; font-family: 'LuckiestGuy'; font-weight: bold; font-size: 12px; color: var(--text-primary); flex: 0 0 auto; }
.busiest-bar-track { flex: 1; height: 10px; background: var(--bg-track); border-radius: 5px; overflow: hidden; }
.busiest-bar-fill { height: 100%; background: #007aff; border-radius: 5px; }
.busiest-row.busiest-max .busiest-bar-fill { background: #ff9500; }
.busiest-row.busiest-max .busiest-day { color: #ff9500; }

.busiest-card.cancelled .busiest-bar-fill { background: #ff3b30; }
.busiest-card.cancelled .busiest-row.busiest-max .busiest-bar-fill { background: #b0201a; }
.busiest-card.cancelled .busiest-row.busiest-max .busiest-day { color: #b0201a; }
.busiest-count { width: 20px; text-align: right; font-size: 11px; color: var(--text-secondary); font-weight: bold; }

.rate-input-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 14px; }
.rate-input-row input { font-size: 22px; padding: 8px; border-radius: 8px; border: 1px solid var(--input-border); font-weight: bold; width: 100px; text-align: center; background: var(--bg-card); color: var(--text-primary); }
.rate-euro { font-size: 22px; font-weight: bold; }

.modal-buttons { display: flex; justify-content: space-between; margin-top: 8px; }
.modal-buttons button { padding: 10px 8px; font-size: 15px; font-weight: bold; background: none; border: none; }
.btn-text { color: #007aff; }
.btn-primary { color: #007aff; }
.btn-destructive { color: #ff3b30; }

.tab-bar { display: flex; border-top: 1px solid var(--border-strong); }
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 8px 0 4px; background: none; border: none; font-size: 10px; font-weight: bold; color: var(--text-secondary); gap: 2px;
}
.tab-btn .tab-icon { font-size: 20px; }
.tab-btn.active { color: #007aff; }

.toast {
  position: fixed; left: 12px; right: 12px; bottom: 24px;
  background: #1c1c1e; color: #fff; padding: 14px 16px; border-radius: 12px;
  font-weight: bold; text-align: center; z-index: 200; display: none;
  box-shadow: 0 4px 14px rgba(0,0,0,0.3);
}
.toast.open { display: block; }

.storage-warning {
  background: #ff3b30; color: #fff; font-size: 12px; font-weight: bold;
  text-align: center; padding: 6px 10px;
}

.build-version {
  font-size: 9px; color: #c7c7cc; text-align: center; padding: 4px 0 2px 0;
}
</style>
</head>
<body>
<div id="bg"></div>
<div id="app"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card" id="modalCard"></div>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="importFileInput" accept="application/json,.json" style="display:none" />

<script>
'use strict';

// 100vh/-webkit-fill-available is unreliable on real mobile Safari — measure the
// actual viewport height in JS and feed it in as a CSS var instead of trusting
// CSS viewport units, which can collapse the whole flex/overflow chain below.
function setAppViewportHeight() {
  document.documentElement.style.setProperty('--app-vh', window.innerHeight + 'px');
}
setAppViewportHeight();
window.addEventListener('resize', setAppViewportHeight);
window.addEventListener('orientationchange', function () { setTimeout(setAppViewportHeight, 100); });

// -- Dark/Light theme: an explicit toggle choice is remembered forever; before
// any choice is made, it follows the system's color-scheme preference. --
// (Uses the literal key string, not the THEME_KEY var declared further down,
// since this runs before that assignment — var hoisting would otherwise make
// THEME_KEY undefined here.)
function loadTheme() {
  var saved = null;
  try { saved = window.localStorage.getItem('gymflow.theme.v1'); } catch (e) { /* ignore */ }
  if (saved === 'light' || saved === 'dark') return saved;
  try {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
  } catch (e) { /* ignore */ }
  return 'light';
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  var meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', theme === 'dark' ? '#000000' : '#ffffff');
}
applyTheme(loadTheme());

window.onerror = function (msg, src, line, col, err) {
  var app = document.getElementById('app');
  if (app) {
    app.innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#ff3b30;">' +
      '<b>Something went wrong.</b><br/><br/>' +
      String(msg) + '<br/>(line ' + line + ':' + col + ')' +
      '</div>';
  }
  return false;
};

var NAMES = [
  'Χάρης (ΦΑΣΑΙΟΣ)',
  'ΜΟΝΙΚΑ (Νεζα)',
  'Γιώργος (ΒΙΚ)',
  'Λένα',
  'ΛΙΝΑ',
  'ΜΑΡΙΑ (ΠΙΓΚΟΥΙΝΟ)',
  'ΠΑΝΑΓΙΩΤΗΣ (ΦΙΛΟΣ ΜΕΛΕΤΗ)',
  'Γιώργος (YENOO)',
  'Γιώργος στουπακις (ΣΤΟΥΠ)',
  'Φαιδρα (ΑΦΑΙΔΡΑ)',
  'ΒΑΡΒΑΡΑ (ΒΑΡ)',
  'Παντελάκης (ΠΑΝΤΕΛΗΗΗΗΣ)',
  'Κωννα (σταγόνα)',
  'Χάρης 2 (ΣΝΙΦΑΡΙΣΜΑ ΜΥΤΗΣ)',
  'Ηλίας μάγειρας (SAILI)',
  'Κώστας (DECIPHER)',
  'Ηλίας (δράκουλιξ)',
  'Θεμης (ΘΕΜ)',
  'Εγώ (Λακτας)',
  'Πατρίκ (πορκι)',
  'Γιάννης ξάδελφος (ΞΑΔ)',
];
var DAY_LABELS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
var MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

var BUILD_VERSION_LABEL = '{{BUILD_VERSION}}';

var OLD_SCHEDULE_KEY = 'gymflow.schedule.v1'; // legacy per-name-per-day model, read only (migration source)
var ATTEND_KEY = 'gymflow.attendance.v2';
var RATES_KEY = 'gymflow.rates.v1';
var NOTES_KEY = 'gymflow.notes.v1';
var PAID_AMOUNTS_KEY = 'gymflow.paidAmounts.v1';
var CANCELLATIONS_KEY = 'gymflow.cancellations.v1';
var SLOTS_KEY = 'gymflow.slots.v3'; // bumped so the new 05:00-23:30 default range applies even for existing installs
var THEME_KEY = 'gymflow.theme.v1';
var NOTIF_MUTE_KEY = 'gymflow.notifMuted.v1';
var ALARM_MUTE_KEY = 'gymflow.alarmMuted.v1';
var FIRED_KEY = 'gymflow.fired.v1';

function pad(n) { return String(n).padStart(2, '0'); }

function attendKey(isoDate, slot, name) { return isoDate + '|' + slot + '|' + name; }

// iOS Safari can throw a SecurityError touching window.localStorage from a
// file:// page. Fall back to an in-memory store so the app still runs instead
// of crashing silently — but track whether we actually have real persistence.
var safeStorage = (function () {
  var memory = {};
  var persistent = false;
  try {
    var testKey = '__gymflow_test__';
    window.localStorage.setItem(testKey, '1');
    window.localStorage.removeItem(testKey);
    persistent = true;
  } catch (e) {
    persistent = false;
  }
  return {
    isPersistent: persistent,
    getItem: function (key) {
      if (persistent) {
        try { return window.localStorage.getItem(key); } catch (e) { return memory[key] || null; }
      }
      return memory.hasOwnProperty(key) ? memory[key] : null;
    },
    setItem: function (key, val) {
      if (persistent) {
        try { window.localStorage.setItem(key, val); return; } catch (e) { /* fall through */ }
      }
      memory[key] = val;
    },
  };
})();

function loadFlag(key) { return safeStorage.getItem(key) === 'true'; }
function saveFlag(key, val) { safeStorage.setItem(key, String(val)); }

function loadFiredSet() {
  try {
    var raw = safeStorage.getItem(FIRED_KEY);
    return raw ? new Set(JSON.parse(raw)) : new Set();
  } catch (e) { return new Set(); }
}
function saveFiredSet(set) {
  safeStorage.setItem(FIRED_KEY, JSON.stringify(Array.from(set)));
}

// -- Time slots (fixed, editable list shared across all days) --
function defaultSlots() {
  var out = [];
  for (var h = 5; h <= 23; h++) {
    out.push(pad(h) + ':00');
    out.push(pad(h) + ':30');
  }
  return out; // 05:00 ... 23:30
}
function saveSlots(slots) { safeStorage.setItem(SLOTS_KEY, JSON.stringify(slots)); }
function loadSlots() {
  try {
    var raw = safeStorage.getItem(SLOTS_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length) return parsed.slice().sort();
    }
  } catch (e) { /* fall through to defaults */ }
  var d = defaultSlots();
  saveSlots(d);
  return d;
}

// -- Rates (€ per session, permanent until manually changed) --
function loadRates() {
  var rates = {};
  try {
    var raw = safeStorage.getItem(RATES_KEY);
    if (raw) rates = JSON.parse(raw) || {};
  } catch (e) { rates = {}; }
  NAMES.forEach(function (name) { if (typeof rates[name] !== 'number') rates[name] = 0; });
  return rates;
}
function saveRates(rates) { safeStorage.setItem(RATES_KEY, JSON.stringify(rates)); }

// -- Notes (isoDate|slot|name -> short comment text, only meaningful when that
// appointment is actually booked) --
function loadNotes() {
  try {
    var raw = safeStorage.getItem(NOTES_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') return parsed;
    }
  } catch (e) { /* fall through */ }
  return {};
}
function saveNotes(notes) { safeStorage.setItem(NOTES_KEY, JSON.stringify(notes)); }

// -- Paid tracking (name|monthKey -> cumulative €amount paid so far). Supports
// partial payments: remaining = (sessions x rate) - amount paid. --
function paidAmountKey(name, monthKey) { return name + '|' + monthKey; }
function loadPaidAmounts() {
  try {
    var raw = safeStorage.getItem(PAID_AMOUNTS_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') return parsed;
    }
  } catch (e) { /* fall through */ }
  return {};
}
function savePaidAmounts(paidAmounts) { safeStorage.setItem(PAID_AMOUNTS_KEY, JSON.stringify(paidAmounts)); }

// -- Cancellations (isoDate|slot|name -> cumulative count). Recorded only when
// an appointment that was actually saved/booked gets removed — used for the
// separate "Busiest Days (Cancelled)" stat, kept apart from normal attendance. --
function loadCancellations() {
  try {
    var raw = safeStorage.getItem(CANCELLATIONS_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') return parsed;
    }
  } catch (e) { /* fall through */ }
  return {};
}
function saveCancellations(cancellations) { safeStorage.setItem(CANCELLATIONS_KEY, JSON.stringify(cancellations)); }

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// -- Attendance (isoDate|slot|name -> true), with one-time migration from the
// old per-name-per-day free-time model so existing bookings aren't lost. --
function nearestSlot(time, slots) {
  if (!slots.length) return time;
  var tp = time.split(':').map(Number);
  var tMin = tp[0] * 60 + tp[1];
  var best = slots[0], bestDiff = Infinity;
  slots.forEach(function (s) {
    var sp = s.split(':').map(Number);
    var diff = Math.abs((sp[0] * 60 + sp[1]) - tMin);
    if (diff < bestDiff) { bestDiff = diff; best = s; }
  });
  return best;
}
function migrateOldSchedule(slots) {
  var attendance = {};
  try {
    var raw = safeStorage.getItem(OLD_SCHEDULE_KEY);
    if (!raw) return attendance;
    var parsed = JSON.parse(raw);
    Object.keys(parsed).forEach(function (key) {
      var v = parsed[key];
      if (!v || typeof v !== 'object' || v.cancelled) return;
      var parts = key.split('|');
      var name = parts[0], isoDate = parts[1];
      if (NAMES.indexOf(name) === -1 || !v.time) return;
      var slot = nearestSlot(v.time, slots);
      attendance[attendKey(isoDate, slot, name)] = true;
    });
  } catch (e) { /* ignore malformed legacy data */ }
  return attendance;
}
function saveAttendance(attendance) { safeStorage.setItem(ATTEND_KEY, JSON.stringify(attendance)); }
function loadAttendance(slots) {
  var raw = safeStorage.getItem(ATTEND_KEY);
  if (raw !== null) {
    try {
      var parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') return parsed;
    } catch (e) { /* fall through */ }
    return {};
  }
  var migrated = migrateOldSchedule(slots);
  saveAttendance(migrated);
  return migrated;
}

// -- Calendar helpers (Monday-start weeks) --
function parseISODate(iso) {
  var parts = iso.split('-').map(Number);
  return new Date(parts[0], parts[1] - 1, parts[2]);
}
function formatISODate(date) {
  return date.getFullYear() + '-' + pad(date.getMonth() + 1) + '-' + pad(date.getDate());
}
function addDays(date, days) {
  var next = new Date(date);
  next.setDate(next.getDate() + days);
  return next;
}
function shortDateLabel(iso) {
  var date = parseISODate(iso);
  return pad(date.getDate()) + '/' + pad(date.getMonth() + 1);
}
function monthKeyOf(iso) { return iso.slice(0, 7); }
function prevMonthKey(monthKey) {
  var parts = monthKey.split('-').map(Number);
  var year = parts[0], month = parts[1] - 1;
  if (month === 0) { month = 12; year -= 1; }
  return year + '-' + pad(month);
}
function nextMonthKey(monthKey) {
  var parts = monthKey.split('-').map(Number);
  var year = parts[0], month = parts[1] + 1;
  if (month === 13) { month = 1; year += 1; }
  return year + '-' + pad(month);
}
function monthLabel(monthKey) {
  var parts = monthKey.split('-').map(Number);
  return MONTH_NAMES[parts[1] - 1] + ' ' + parts[0];
}
function countAttendance(name, monthKey) {
  var count = 0;
  Object.keys(state.attendance).forEach(function (key) {
    if (!state.attendance[key]) return;
    var parts = key.split('|');
    var isoDate = parts[0], slot = parts[1];
    if (parts[2] !== name) return;
    if (monthKeyOf(isoDate) !== monthKey) return;
    // Only sessions that have already happened count toward payouts — a slot
    // booked for later today or a future date isn't owed yet.
    if (!isCompleted(isoDate, slot, state.todayISO, state.nowHHMM)) return;
    count++;
  });
  return count;
}
function formatMoney(n) {
  var s = n.toFixed(2);
  return s.replace(/\.00$/, '');
}

// -- Busiest weekday (Mon..Sun), across all members, for the given month --
function countByWeekday(monthKey) {
  var counts = [0, 0, 0, 0, 0, 0, 0]; // index 0 = Mon ... 6 = Sun
  Object.keys(state.attendance).forEach(function (key) {
    if (!state.attendance[key]) return;
    var parts = key.split('|');
    var isoDate = parts[0], slot = parts[1];
    if (monthKeyOf(isoDate) !== monthKey) return;
    if (!isCompleted(isoDate, slot, state.todayISO, state.nowHHMM)) return;
    var dow = parseISODate(isoDate).getDay();
    counts[(dow + 6) % 7]++;
  });
  return counts;
}

// -- Busiest weekday for CANCELLED appointments only, kept separate from the
// normal attendance-based Busiest Days above. --
function countCancelledByWeekday(monthKey) {
  var counts = [0, 0, 0, 0, 0, 0, 0];
  Object.keys(state.cancellations).forEach(function (key) {
    var n = state.cancellations[key];
    if (!n) return;
    var isoDate = key.split('|')[0];
    if (monthKeyOf(isoDate) !== monthKey) return;
    var dow = parseISODate(isoDate).getDay();
    counts[(dow + 6) % 7] += n;
  });
  return counts;
}

// -- Running balance (so an overpayment this month carries forward and
// reduces what's owed next month, instead of just being discarded) --
function monthKeysWithActivity(name, upToMonthKey) {
  var keys = {};
  Object.keys(state.attendance).forEach(function (k) {
    if (!state.attendance[k]) return;
    var parts = k.split('|');
    if (parts[2] !== name) return;
    var mk = monthKeyOf(parts[0]);
    if (mk <= upToMonthKey) keys[mk] = true;
  });
  Object.keys(state.paidAmounts).forEach(function (k) {
    var idx = k.lastIndexOf('|');
    var pname = k.slice(0, idx), mk = k.slice(idx + 1);
    if (pname !== name) return;
    if (mk <= upToMonthKey) keys[mk] = true;
  });
  return Object.keys(keys).sort();
}
function computeBalance(name, upToMonthKey) {
  var rate = state.rates[name] || 0;
  var months = monthKeysWithActivity(name, upToMonthKey);
  var totalOwed = 0, totalPaid = 0;
  months.forEach(function (mk) {
    totalOwed += countAttendance(name, mk) * rate;
    totalPaid += state.paidAmounts[paidAmountKey(name, mk)] || 0;
  });
  return { totalOwed: totalOwed, totalPaid: totalPaid, remaining: Math.max(totalOwed - totalPaid, 0) };
}

// -- Athens time (offline-safe: uses the JS engine's built-in ICU tz data) --
var athensTimeFormatter = new Intl.DateTimeFormat('en-GB', {
  timeZone: 'Europe/Athens', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
});
var athensDateFormatter = new Intl.DateTimeFormat('en-CA', {
  timeZone: 'Europe/Athens', year: 'numeric', month: '2-digit', day: '2-digit',
});
function currentAthensTime() { return athensTimeFormatter.format(new Date()); }
function currentAthensISODate() { return athensDateFormatter.format(new Date()); }

function athensOffsetMinutes(guessUTCms) {
  var d = new Date(guessUTCms);
  var utc = new Date(d.toLocaleString('en-US', { timeZone: 'UTC' }));
  var athens = new Date(d.toLocaleString('en-US', { timeZone: 'Europe/Athens' }));
  return (athens.getTime() - utc.getTime()) / 60000;
}
function athensWallClockToInstant(isoDate, time) {
  var dp = isoDate.split('-').map(Number);
  var tp = time.split(':').map(Number);
  var guessUTC = Date.UTC(dp[0], dp[1] - 1, dp[2], tp[0], tp[1]);
  var offset = athensOffsetMinutes(guessUTC);
  return new Date(guessUTC - offset * 60000);
}

function isCompleted(isoDate, time, todayISO, nowHHMM) {
  if (isoDate < todayISO) return true;
  if (isoDate > todayISO) return false;
  // Strictly "<" (not "<="): a slot at 13:20 stays blue for the whole
  // 13:20 minute and only turns green once the clock reaches 13:21.
  return time < nowHHMM;
}

// -- Beep (no audio file needed, generated in-browser) --
var audioCtx = null;
function beep(freq, durationMs) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.3, audioCtx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + durationMs / 1000);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + durationMs / 1000);
  } catch (e) { /* audio not available */ }
}
function playReminderSound() { beep(880, 250); setTimeout(function () { beep(880, 250); }, 300); }
function playAlarmSound() {
  var i = 0;
  var iv = setInterval(function () {
    beep(660, 200);
    i++;
    if (i >= 6) clearInterval(iv);
  }, 300);
}

function showToast(text) {
  var toast = document.getElementById('toast');
  toast.textContent = text;
  toast.classList.add('open');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(function () { toast.classList.remove('open'); }, 6000);
}

function openSlotCellModal(isoDate, slot, dayLabel) {
  state.activeSlotCell = { isoDate: isoDate, slot: slot, dayLabel: dayLabel };
  state.slotCellDraft = {};
  state.slotCellOriginal = {};
  state.slotCellConfirmName = null;
  NAMES.forEach(function (name) {
    var wasBooked = !!state.attendance[attendKey(isoDate, slot, name)];
    state.slotCellDraft[name] = wasBooked;
    state.slotCellOriginal[name] = wasBooked;
  });
  renderSlotCellModal();
}
function closeSlotCellModal() {
  state.activeSlotCell = null;
  state.slotCellConfirmName = null;
  state.noteEditKey = null;
  document.getElementById('modalOverlay').classList.remove('open');
  render();
}
function openNoteEditor(isoDate, slot, name) {
  state.noteEditKey = { isoDate: isoDate, slot: slot, name: name };
  state.noteEditText = state.notes[attendKey(isoDate, slot, name)] || '';
  renderSlotCellModal();
}
function closeNoteEditor() {
  state.noteEditKey = null;
  state.noteEditText = '';
  renderSlotCellModal();
}
function renderSlotCellModal() {
  var overlay = document.getElementById('modalOverlay');
  var card = document.getElementById('modalCard');
  var cell = state.activeSlotCell;
  if (!cell) { overlay.classList.remove('open'); return; }

  var html;
  if (state.noteEditKey) {
    var nk = state.noteEditKey;
    html = '<div class="modal-title">' + nk.name + ' · ' + nk.slot + ' Comment</div>';
    html += '<textarea id="noteTextarea" class="note-textarea" placeholder="e.g. He told me he\'ll come at 4:15">' + escapeHtml(state.noteEditText) + '</textarea>';
    html += '<div class="modal-buttons"><button class="btn-text" id="btnNoteCancel">Cancel</button><button class="btn-primary" id="btnNoteSave">Save</button></div>';
  } else if (state.slotCellConfirmName) {
    var confirmName = state.slotCellConfirmName;
    html = '<div class="modal-title">Remove ' + confirmName + '?</div>';
    html += '<div style="text-align:center;font-size:13px;color:#555;margin:0 0 16px 0;line-height:1.4;">Are you sure you want to remove <b>' + confirmName + '</b> from <b>' + cell.slot + '</b> on <b>' + cell.dayLabel + ' ' + shortDateLabel(cell.isoDate) + '</b>?</div>';
    html += '<div class="modal-buttons"><button class="btn-text" id="btnSlotCellCancelRemove">Cancel</button><button class="btn-destructive" id="btnSlotCellConfirmRemove">Remove</button></div>';
  } else {
    html = '<div class="modal-title">' + cell.dayLabel + ' ' + shortDateLabel(cell.isoDate) + ' · ' + cell.slot + '</div>';
    html += '<div class="member-toggle-list">';
    NAMES.forEach(function (name) {
      var checked = !!state.slotCellDraft[name];
      var savedKey = attendKey(cell.isoDate, cell.slot, name);
      var isActualAppointment = !!state.attendance[savedKey];
      var note = state.notes[savedKey];

      html += '<div class="member-toggle-row" data-name="' + name + '">';
      html += '  <span class="member-toggle-name">' + name + '</span>';
      html += '  <span class="member-toggle-check">' + (checked ? '✓' : '') + '</span>';
      html += '</div>';

      // A comment only makes sense for an appointment that's actually booked
      // (saved), not just a checkbox toggled in this not-yet-saved draft.
      if (isActualAppointment) {
        html += '<div class="member-note-row" data-name="' + name + '">';
        html += '  <span class="member-note-icon">💬</span>';
        html += '  <span class="member-note-text">' + (note ? escapeHtml(note) : 'Add Comment') + '</span>';
        html += '</div>';
      }
    });
    html += '</div>';
    html += '<div class="modal-buttons"><button class="btn-text" id="btnSlotCellClose">Close</button><button class="btn-primary" id="btnSlotCellSave">Save</button></div>';
  }

  card.innerHTML = html;
  overlay.classList.add('open');

  if (state.noteEditKey) {
    document.getElementById('btnNoteCancel').onclick = closeNoteEditor;
    document.getElementById('btnNoteSave').onclick = function () {
      var nk2 = state.noteEditKey;
      var key = attendKey(nk2.isoDate, nk2.slot, nk2.name);
      var text = document.getElementById('noteTextarea').value.trim();
      if (text) state.notes[key] = text;
      else delete state.notes[key];
      saveNotes(state.notes);
      closeNoteEditor();
    };
    return;
  }

  if (state.slotCellConfirmName) {
    document.getElementById('btnSlotCellCancelRemove').onclick = function () {
      state.slotCellConfirmName = null;
      renderSlotCellModal();
    };
    document.getElementById('btnSlotCellConfirmRemove').onclick = function () {
      state.slotCellDraft[state.slotCellConfirmName] = false;
      state.slotCellConfirmName = null;
      renderSlotCellModal();
    };
    return;
  }

  document.getElementById('btnSlotCellClose').onclick = closeSlotCellModal;
  Array.prototype.forEach.call(document.querySelectorAll('.member-toggle-row'), function (rowEl) {
    rowEl.onclick = function () {
      var name = rowEl.getAttribute('data-name');
      if (state.slotCellDraft[name]) {
        // Unchecking someone who's currently booked — confirm before removing.
        state.slotCellConfirmName = name;
        renderSlotCellModal();
      } else {
        state.slotCellDraft[name] = true;
        renderSlotCellModal();
      }
    };
  });
  Array.prototype.forEach.call(document.querySelectorAll('.member-note-row'), function (rowEl) {
    rowEl.onclick = function () {
      openNoteEditor(cell.isoDate, cell.slot, rowEl.getAttribute('data-name'));
    };
  });
  document.getElementById('btnSlotCellSave').onclick = function () {
    var cancellationsChanged = false;
    NAMES.forEach(function (name) {
      var key = attendKey(cell.isoDate, cell.slot, name);
      var wasBooked = !!state.slotCellOriginal[name];
      if (state.slotCellDraft[name]) {
        state.attendance[key] = true;
      } else {
        delete state.attendance[key];
        if (state.notes[key]) { delete state.notes[key]; saveNotes(state.notes); }
        // Only counts as a cancellation if it was an actual saved appointment
        // being removed, not a checkbox that was toggled on/off in this same
        // not-yet-saved session without ever being booked.
        if (wasBooked) {
          state.cancellations[key] = (state.cancellations[key] || 0) + 1;
          cancellationsChanged = true;
        }
      }
    });
    saveAttendance(state.attendance);
    if (cancellationsChanged) saveCancellations(state.cancellations);
    closeSlotCellModal();
  };
}

function monthKeyForOffset(offset) {

  if (offset < 0) { for (i = 0; i > offset; i--) key = prevMonthKey(key); }
  else if (offset > 0) { for (i = 0; i < offset; i++) key = nextMonthKey(key); }
  return key;
}

  });

  html += '<div class="list-wrap"><div class="stats-tab-list"><div class="pull-indicator">⌄ Pull to refresh</div>';

  var ranked = rows.slice().sort(function (a, b) { return b.count - a.count; });
  var medals = ['🥇', '🥈', '🥉'];
  html += '<div class="attendance-card">';
  html += '  <div class="attendance-title">Most Frequent · ' + monthLabel(targetKey) + '</div>';

    html += '  <div class="attendance-row">';

    html += '    <span class="attendance-name">' + r.name + '</span>';

    html += '  </div>';
  });
  html += '</div>';

  var weekdayCounts = countByWeekday(targetKey);
  var maxDayCount = Math.max.apply(null, weekdayCounts);
  html += '<div class="busiest-card">';
  html += '  <div class="attendance-title">Busiest Days · ' + monthLabel(targetKey) + '</div>';
  DAY_LABELS.forEach(function (label, i) {
    var c = weekdayCounts[i];
    var pct = maxDayCount > 0 ? (c / maxDayCount * 100) : 0;
    html += '  <div class="busiest-row' + (maxDayCount > 0 && c === maxDayCount ? ' busiest-max' : '') + '">';
    html += '    <span class="busiest-day">' + label + '</span>';
    html += '    <div class="busiest-bar-track"><div class="busiest-bar-fill" style="width:' + pct + '%"></div></div>';
    html += '    <span class="busiest-count">' + c + '</span>';
    html += '  </div>';
  });
  html += '</div>';

  var cancelledWeekdayCounts = countCancelledByWeekday(targetKey);
  var maxCancelledDayCount = Math.max.apply(null, cancelledWeekdayCounts);
  html += '<div class="busiest-card cancelled">';
  html += '  <div class="attendance-title">Busiest Days (Cancelled) · ' + monthLabel(targetKey) + '</div>';
  DAY_LABELS.forEach(function (label, i) {
    var c = cancelledWeekdayCounts[i];

    html += '  <div class="busiest-row' + (maxCancelledDayCount > 0 && c === maxCancelledDayCount ? ' busiest-max' : '') + '">';

    html += '    <span class="busiest-count">' + c + '</span>';
    html += '  </div>';
  });
  html += '</div>';

  html += '</div></div>';

  return html;
}

// -- Backup export/import (JSON file, for moving data to a new phone) --
function exportBackup() {
  var payload = {
    app: 'gymflow',
    version: 1,
    exportedAt: new Date().toISOString(),
    slots: state.slots,
    rates: state.rates,
    attendance: state.attendance,
    notes: state.notes,
    paidAmounts: state.paidAmounts,
  };
  var json = JSON.stringify(payload, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'gymflow-backup-' + state.todayISO + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function () { URL.revokeObjectURL(url); }, 4000);
  showToast('Backup exported');
}

function handleImportFile(file) {
  var reader = new FileReader();
  reader.onload = function (e) {
    var data;
    try {
      data = JSON.parse(e.target.result);
    } catch (err) {
      showToast('That file isn\'t a valid backup');
      return;
    }
    if (!data || typeof data !== 'object' || data.app !== 'gymflow') {
      showToast('That file isn\'t a valid GymFlow backup');
      return;
    }
    state.importDraft = data;
    renderImportModal();
  };
  reader.onerror = function () { showToast('Could not read that file'); };
  reader.readAsText(file);
}
function closeImportModal() {
  state.importDraft = null;
  document.getElementById('modalOverlay').classList.remove('open');
  render();
}
function renderImportModal() {
  var overlay = document.getElementById('modalOverlay');
  var card = document.getElementById('modalCard');
  var data = state.importDraft;
  if (!data) { overlay.classList.remove('open'); return; }

  var when = data.exportedAt ? new Date(data.exportedAt).toLocaleString() : 'an unknown time';
  var html = '<div class="modal-title">Import Backup?</div>';
  html += '<div style="text-align:center;font-size:13px;color:#555;margin:0 0 16px 0;line-height:1.4;">This backup was exported on <b>' + escapeHtml(when) + '</b>. Importing it will <b>replace all current data</b> — appointments, rates, payments, and notes. This can\'t be undone.</div>';
  html += '<div class="modal-buttons"><button class="btn-text" id="btnImportCancel">Cancel</button><button class="btn-destructive" id="btnImportConfirm">Import</button></div>';

  card.innerHTML = html;
  overlay.classList.add('open');

  document.getElementById('btnImportCancel').onclick = closeImportModal;
  document.getElementById('btnImportConfirm').onclick = function () {
    if (Array.isArray(data.slots) && data.slots.length) {
      state.slots = data.slots.slice().sort();
      saveSlots(state.slots);
    }
    if (data.rates && typeof data.rates === 'object') {
      state.rates = data.rates;
      NAMES.forEach(function (n) { if (typeof state.rates[n] !== 'number') state.rates[n] = 0; });
      saveRates(state.rates);
    }
    if (data.attendance && typeof data.attendance === 'object') {
      state.attendance = data.attendance;
      saveAttendance(state.attendance);
    }
    if (data.notes && typeof data.notes === 'object') {
      state.notes = data.notes;
      saveNotes(state.notes);
    }
    if (data.paidAmounts && typeof data.paidAmounts === 'object') {
      state.paidAmounts = data.paidAmounts;
      savePaidAmounts(state.paidAmounts);
    }
    state.importDraft = null;
    document.getElementById('modalOverlay').classList.remove('open');
    render();
    showToast('Backup imported');
  };
}

var lastRenderedTab = null;
var SCROLLABLE_LIST_SELECTOR = '.slot-list, .payouts-list, .members-list, .stats-tab-list';

function render() {
  var app = document.getElementById('app');

  // The 1-second clock/reminder tick calls render() constantly, which rebuilds
  // the whole tab from scratch — without this, that wipes the user's scroll
  // position back to the top every second while they're mid-scroll.
  var prevScrollEl = document.querySelector(SCROLLABLE_LIST_SELECTOR);
  var prevScrollTop = (prevScrollEl && lastRenderedTab === state.activeTab) ? prevScrollEl.scrollTop : 0;

  var html = '';
  if (!safeStorage.isPersistent) {
    html += '<div class="storage-warning">⚠️ Storage is blocked on this page — data will NOT be saved after you close the app.</div>';
  }
  html += '<div class="top-bar">';
  html += '  <div class="clock-box"><div class="clock-text">' + currentAthensTime() + '</div><div class="clock-label">Athens</div></div>';
  html += '  <div class="top-bar-buttons">';
    html += '    <button class="icon-btn" id="btnTheme">' + (state.theme === 'dark' ? '☀️' : '🌙') + '</button>';
  html += '    <button class="icon-btn' + (state.notificationsMuted ? ' muted' : '') + '" id="btnNotif">' + (state.notificationsMuted ? '🔕' : '🔔') + '</button>';
  html += '    <button class="icon-btn' + (state.alarmMuted ? ' muted' : '') + '" id="btnAlarm">' + (state.alarmMuted ? '⏰🚫' : '⏰') + '</button>';
  html += '  </div>';
  html += '</div>';

  html += '<div class="title">GymFlow</div>';

  html += '<div class="tab-content">';
  var tabRenderFailed = false;
  try {
    if (state.activeTab === 'board') html += renderBoardTab();
    else if (state.activeTab === 'payouts') html += renderPayoutsTab();
    else if (state.activeTab === 'members') html += renderMembersTab();
    else html += renderStatsTab();
  } catch (e) {
    tabRenderFailed = true;
    html += '<div style="padding:20px;color:#ff3b30;font-size:12px;font-weight:bold;">Couldn\'t show this tab.<br/><br/>' + (e && e.message ? e.message : String(e)) + '</div>';
  }
  html += '</div>';

  html += '<div class="tab-bar">';
  html += tabButton('board', '📅', 'Board');
  html += tabButton('payouts', '💶', 'Payouts');
  html += tabButton('members', '👥', 'Members');
  html += tabButton('stats', '📊', 'Stats');
  html += '</div>';

  html += '<div class="build-version">build ' + BUILD_VERSION_LABEL + '</div>';

  app.innerHTML = html;
  lastRenderedTab = state.activeTab;

  if (prevScrollTop) {
    var newScrollEl = document.querySelector(SCROLLABLE_LIST_SELECTOR);
    if (newScrollEl) newScrollEl.scrollTop = prevScrollTop;
  }

  document.getElementById('btnTheme').onclick = function () {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    saveFlag(THEME_KEY, state.theme); // saveFlag just does setItem(key, val); reused here for a string value
    applyTheme(state.theme);
    render();
  };
  document.getElementById('btnNotif').onclick = function () {
    state.notificationsMuted = !state.notificationsMuted;
    saveFlag(NOTIF_MUTE_KEY, state.notificationsMuted);
    render();
  };
  document.getElementById('btnAlarm').onclick = function () {
    state.alarmMuted = !state.alarmMuted;
    saveFlag(ALARM_MUTE_KEY, state.alarmMuted);
    render();
  };

  Array.prototype.forEach.call(document.querySelectorAll('.tab-btn'), function (btn) {
    btn.onclick = function () { state.activeTab = btn.getAttribute('data-tab'); render(); };
  });

  if (!tabRenderFailed) {
    try {
      if (state.activeTab === 'board') wireBoardTab();
      else if (state.activeTab === 'payouts') wirePayoutsTab();
      else if (state.activeTab === 'members') wireMembersTab();
      else wireStatsTab();
    } catch (e) {
      var tc = document.querySelector('.tab-content');
      if (tc) tc.innerHTML = '<div style="padding:20px;color:#ff3b30;font-size:12px;font-weight:bold;">Couldn\'t set up this tab.<br/><br/>' + (e && e.message ? e.message : String(e)) + '</div>';
    }
  }

  wirePullToRefresh();
}

// Manual pull-to-refresh, works the same on whichever list is currently shown
// (Board/Payouts/Members) since it re-binds after every render().
function wirePullToRefresh() {
  var list = document.querySelector(SCROLLABLE_LIST_SELECTOR);
  if (!list) return;
  var indicator = list.querySelector('.pull-indicator');
  if (!indicator) return;

  var THRESHOLD = 60;
  var MAX_PULL = 90;
  var startY = null;
  var pulling = false;

  list.addEventListener('touchstart', function (e) {
    if (list.scrollTop <= 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    } else {
      startY = null;
      pulling = false;
    }
  }, { passive: true });

  list.addEventListener('touchmove', function (e) {
    if (!pulling || startY === null) return;
    var dy = e.touches[0].clientY - startY;
    if (dy <= 0) { indicator.style.height = '0px'; return; }
    var pull = Math.min(dy * 0.5, MAX_PULL);
    indicator.style.height = pull + 'px';
    indicator.textContent = pull >= THRESHOLD ? '↑ Release to refresh' : '⌄ Pull to refresh';
  }, { passive: true });

  list.addEventListener('touchend', function () {
    if (!pulling) return;
    pulling = false;
    var pull = parseFloat(indicator.style.height) || 0;
    startY = null;
    if (pull >= THRESHOLD) {
      indicator.textContent = '↻ Refreshing…';
      setTimeout(function () {
        state.todayISO = currentAthensISODate();
        state.nowHHMM = currentAthensTime().slice(0, 5);
        render();
      }, 300);
    } else {
      indicator.style.height = '0px';
    }
  }, { passive: true });
}

    };
  });

  document.getElementById('btnAddSlot').onclick = function () {
    state.newSlotHour = parseInt(document.getElementById('newSlotHour').value, 10);
    state.newSlotMinute = parseInt(document.getElementById('newSlotMinute').value, 10);
    var slot = pad(state.newSlotHour) + ':' + pad(state.newSlotMinute);
    if (state.slots.indexOf(slot) === -1) {
      state.slots.push(slot);
      state.slots.sort();
      saveSlots(state.slots);
    }
    renderSlotsModal();
  };
}

document.getElementById('modalOverlay').onclick = function (e) {
  if (e.target.id !== 'modalOverlay') return;
  if (state.editingRateName) closeRateModal();
  if (state.slotsModalOpen) closeSlotsModal();
  if (state.activeSlotCell) closeSlotCellModal();
  if (state.paidModalName) closePaidModal();
  if (state.importDraft) closeImportModal();
};

document.getElementById('importFileInput').onchange = function (e) {
  var file = e.target.files && e.target.files[0];
  if (file) handleImportFile(file);
  e.target.value = ''; // allow importing the same filename again later
};

// -- In-app reminder/alarm loop --
// NOTE: this can only fire while the app is actually open on screen. iOS does not
// allow real background/lock-screen notifications for a page loaded from a local
// file (file://) — that needs a proper https/local-network server, which this
// version intentionally does not use.
function checkReminders() {
  var fired = loadFiredSet();
  var now = Date.now();
  var changed = false;

  Object.keys(state.attendance).forEach(function (key) {
    if (!state.attendance[key]) return;
    var parts = key.split('|');
    var isoDate = parts[0], slot = parts[1], name = parts[2];
    var target = athensWallClockToInstant(isoDate, slot).getTime();

    var reminderId = key + '|reminder';
    var alarmId = key + '|alarm';
    var reminderAt = target - 10 * 60000;

    if (!state.notificationsMuted && !fired.has(reminderId) && now >= reminderAt && now < target) {
      fired.add(reminderId);
      changed = true;
      showToast(name + ' in 10 min — ' + slot);
      playReminderSound();
    }
    if (!state.alarmMuted && !fired.has(alarmId) && now >= target && now < target + 60000) {
      fired.add(alarmId);
      changed = true;
      showToast('⏰ ' + name + "'s appointment now (" + slot + ')');
      playAlarmSound();
    }
  });

  if (changed) saveFiredSet(fired);
}

setInterval(function () {
  state.todayISO = currentAthensISODate();
  state.nowHHMM = currentAthensTime().slice(0, 5);
  checkReminders();
  // Only update the clock text directly — no full re-render, so the visible
  // list never gets rebuilt/scrolled-to-top on its own. Blue->green slot
  // transitions and anything else time-dependent apply on the next real
  // render (tab switch, chip tap, or manual pull-to-refresh below).
  var clockEl = document.querySelector('.clock-text');
  if (clockEl) clockEl.textContent = currentAthensTime();
}, 1000);

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission().catch(function () {});
}

render();

// -- Service worker: makes reopening the installed app pick up new deploys
// automatically instead of getting stuck on a stale cached copy. --
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js?v={{BUILD_VERSION}}').then(function (reg) {
      reg.update();
    }).catch(function () { /* ignore */ });

    var refreshed = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (refreshed) return;
      refreshed = true;
      window.location.reload();
    });
  });

  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible' && navigator.serviceWorker.controller) {
      navigator.serviceWorker.getRegistration().then(function (reg) {
        if (reg) reg.update();
      });
    }
  });
}
</script>
