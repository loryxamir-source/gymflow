<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="GymFlow" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#ffffff" />
<link rel="apple-touch-icon" href="data:image/png;base64,{{ICON_BASE64}}" />
<link rel="icon" href="data:image/png;base64,{{ICON_BASE64}}" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>GymFlow</title>
<style>
@font-face {
  font-family: 'LuckiestGuy';
  src: url(data:font/ttf;base64,{{FONT_BASE64}}) format('truetype');
  font-weight: normal;
  font-style: normal;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: #ffffff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: -webkit-fill-available;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  position: relative;
}

#bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url(data:image/jpeg;base64,{{BG_BASE64}});
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}

#app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; }

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px 0 14px;
}

.clock-box { display: flex; flex-direction: column; align-items: flex-start; }
.clock-text { font-family: 'LuckiestGuy'; font-weight: bold; font-size: 22px; color: #1c1c1e; font-variant-numeric: tabular-nums; }
.clock-label { font-size: 11px; color: #8e8e93; font-weight: bold; margin-top: -2px; }

.top-bar-buttons { display: flex; align-items: center; gap: 10px; }
.icon-btn {
  width: 42px; height: 42px; border-radius: 21px;
  background: #f2f2f7; display: flex; align-items: center; justify-content: center;
  font-size: 20px; border: none; font-weight: bold;
}
.icon-btn.muted { background: #ffe5e5; }

.title {
  font-family: 'LuckiestGuy'; font-weight: bold; font-size: 28px;
  text-align: center; margin: 12px 0 4px 0; color: #1c1c1e;
}

.week-bar {
  display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px;
}
.week-range-text { font-family: 'LuckiestGuy'; font-weight: bold; font-size: 14px; color: #1c1c1e; }
.week-dates-text { font-size: 12px; color: #8e8e93; font-weight: bold; }
.week-reset-text { font-size: 12px; color: #007aff; font-weight: bold; background: none; border: none; }

.week-arrow {
  flex: 0 0 auto;
  width: 22px; height: 22px; border-radius: 11px;
  background: rgba(0,0,0,0.35); color: #fff; font-size: 13px; font-weight: bold;
  display: flex; align-items: center; justify-content: center; border: none;
}

.tab-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; min-height: 0; }

.edit-slots-btn-row { display: flex; justify-content: center; margin-bottom: 6px; }
.edit-slots-btn { font-size: 12px; color: #007aff; font-weight: bold; background: none; border: none; }

.slot-list, .payouts-list, .members-list {
  flex: 1; overflow-y: auto; width: 100%; padding: 0 12px 10px 12px; -webkit-overflow-scrolling: touch; min-height: 0;
}

.slot-row { display: flex; align-items: center; gap: 6px; padding: 6px 0; border-bottom: 1px solid #eee; }
.slot-time { width: 46px; font-family: 'LuckiestGuy'; font-weight: bold; font-size: 12px; color: #1c1c1e; flex: 0 0 auto; }
.slot-chips { display: flex; gap: 6px; flex: 1; min-width: 0; }
.chip {
  flex: 1; min-width: 0; padding: 8px 2px; border-radius: 8px; background: #f2f2f7; border: none;
  font-family: 'LuckiestGuy'; font-weight: bold; font-size: 10px; color: #8e8e93; text-align: center;
}
.chip.filled { background: #007aff; color: #fff; }
.chip.completed { background: #34c759; color: #fff; }

.slots-manage-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid #eee; }
.slots-manage-time { font-weight: bold; font-family: 'LuckiestGuy'; font-size: 13px; color: #1c1c1e; }
.slots-remove-btn { color: #ff3b30; font-weight: bold; background: none; border: none; font-size: 18px; }
.slots-manage-list { max-height: 220px; overflow-y: auto; }
.slots-add-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; justify-content: center; }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  display: none; align-items: center; justify-content: center; z-index: 100;
}
.modal-overlay.open { display: flex; }
.modal-card { background: #fff; border-radius: 14px; padding: 16px; width: 82%; max-width: 320px; }
.modal-title { font-family: 'LuckiestGuy'; font-weight: bold; font-size: 15px; text-align: center; margin-bottom: 12px; color: #555; }

.time-select-row { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 12px; }
.time-select-row select { font-size: 24px; padding: 8px; border-radius: 8px; border: 1px solid #d0d0d5; font-weight: bold; background: #fff; }
.time-select-row .colon { font-size: 24px; font-weight: bold; }

.stats-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 4px; border-bottom: 1px solid #eee; }
.stats-row:last-child { border-bottom: none; margin-bottom: 4px; }
.stats-row.member-row { cursor: pointer; }
.stats-month { font-family: 'LuckiestGuy'; font-weight: bold; font-size: 13px; color: #1c1c1e; }
.stats-tag { font-size: 10px; color: #8e8e93; font-weight: bold; margin-top: 1px; }
.stats-count { font-family: 'LuckiestGuy'; font-weight: bold; font-size: 18px; color: #007aff; }
.stats-count .cur { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

.rate-input-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 14px; }
.rate-input-row input { font-size: 22px; padding: 8px; border-radius: 8px; border: 1px solid #d0d0d5; font-weight: bold; width: 100px; text-align: center; }
.rate-euro { font-size: 22px; font-weight: bold; }

.modal-buttons { display: flex; justify-content: space-between; margin-top: 8px; }
.modal-buttons button { padding: 10px 8px; font-size: 15px; font-weight: bold; background: none; border: none; }
.btn-text { color: #007aff; }
.btn-primary { color: #007aff; }
.btn-destructive { color: #ff3b30; }

.tab-bar { display: flex; border-top: 1px solid #e5e5ea; }
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 8px 0 4px; background: none; border: none; font-size: 10px; font-weight: bold; color: #8e8e93; gap: 2px;
}
.tab-btn .tab-icon { font-size: 20px; }
.tab-btn.active { color: #007aff; }

.toast {
  position: fixed; left: 12px; right: 12px; bottom: 24px;
  background: #1c1c1e; color: #fff; padding: 14px 16px; border-radius: 12px;
  font-weight: bold; text-align: center; z-index: 200; display: none;
  box-shadow: 0 4px 14px rgba(0,0,0,0.3);
}
.toast.open { display: block; }

.storage-warning {
  background: #ff3b30; color: #fff; font-size: 12px; font-weight: bold;
  text-align: center; padding: 6px 10px;
}

.build-version {
  font-size: 9px; color: #c7c7cc; text-align: center; padding: 4px 0 2px 0;
}
</style>
</head>
<body>
<div id="bg"></div>
<div id="app"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card" id="modalCard"></div>
</div>
<div class="toast" id="toast"></div>

<script>
'use strict';

window.onerror = function (msg, src, line, col, err) {
  var app = document.getElementById('app');
  if (app) {
    app.innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#ff3b30;">' +
      '<b>Something went wrong.</b><br/><br/>' +
      String(msg) + '<br/>(line ' + line + ':' + col + ')' +
      '</div>';
  }
  return false;
};

var NAMES = ['Ilias', 'Themis', 'Charis', 'Christos'];
var DAY_LABELS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
var MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

var BUILD_VERSION_LABEL = '{{BUILD_VERSION}}';

var OLD_SCHEDULE_KEY = 'gymflow.schedule.v1'; // legacy per-name-per-day model, read only (migration source)
var ATTEND_KEY = 'gymflow.attendance.v2';
var RATES_KEY = 'gymflow.rates.v1';
var SLOTS_KEY = 'gymflow.slots.v1';
var NOTIF_MUTE_KEY = 'gymflow.notifMuted.v1';
var ALARM_MUTE_KEY = 'gymflow.alarmMuted.v1';
var FIRED_KEY = 'gymflow.fired.v1';

function pad(n) { return String(n).padStart(2, '0'); }

function attendKey(isoDate, slot, name) { return isoDate + '|' + slot + '|' + name; }

// iOS Safari can throw a SecurityError touching window.localStorage from a
// file:// page. Fall back to an in-memory store so the app still runs instead
// of crashing silently — but track whether we actually have real persistence.
var safeStorage = (function () {
  var memory = {};
  var persistent = false;
  try {
    var testKey = '__gymflow_test__';
    window.localStorage.setItem(testKey, '1');
    window.localStorage.removeItem(testKey);
    persistent = true;
  } catch (e) {
    persistent = false;
  }
  return {
    isPersistent: persistent,
    getItem: function (key) {
      if (persistent) {
        try { return window.localStorage.getItem(key); } catch (e) { return memory[key] || null; }
      }
      return memory.hasOwnProperty(key) ? memory[key] : null;
    },
    setItem: function (key, val) {
      if (persistent) {
        try { window.localStorage.setItem(key, val); return; } catch (e) { /* fall through */ }
      }
      memory[key] = val;
    },
  };
})();

function loadFlag(key) { return safeStorage.getItem(key) === 'true'; }
function saveFlag(key, val) { safeStorage.setItem(key, String(val)); }

function loadFiredSet() {
  try {
    var raw = safeStorage.getItem(FIRED_KEY);
    return raw ? new Set(JSON.parse(raw)) : new Set();
  } catch (e) { return new Set(); }
}
function saveFiredSet(set) {
  safeStorage.setItem(FIRED_KEY, JSON.stringify(Array.from(set)));
}

// -- Time slots (fixed, editable list shared across all days) --
function defaultSlots() {
  var out = [];
  for (var h = 8; h <= 21; h++) {
    out.push(pad(h) + ':00');
    out.push(pad(h) + ':30');
  }
  return out;
}
function saveSlots(slots) { safeStorage.setItem(SLOTS_KEY, JSON.stringify(slots)); }
function loadSlots() {
  try {
    var raw = safeStorage.getItem(SLOTS_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length) return parsed.slice().sort();
    }
  } catch (e) { /* fall through to defaults */ }
  var d = defaultSlots();
  saveSlots(d);
  return d;
}

// -- Rates (€ per session, permanent until manually changed) --
function loadRates() {
  var rates = {};
  try {
    var raw = safeStorage.getItem(RATES_KEY);
    if (raw) rates = JSON.parse(raw) || {};
  } catch (e) { rates = {}; }
  NAMES.forEach(function (name) { if (typeof rates[name] !== 'number') rates[name] = 0; });
  return rates;
}
function saveRates(rates) { safeStorage.setItem(RATES_KEY, JSON.stringify(rates)); }

// -- Attendance (isoDate|slot|name -> true), with one-time migration from the
// old per-name-per-day free-time model so existing bookings aren't lost. --
function nearestSlot(time, slots) {
  if (!slots.length) return time;
  var tp = time.split(':').map(Number);
  var tMin = tp[0] * 60 + tp[1];
  var best = slots[0], bestDiff = Infinity;
  slots.forEach(function (s) {
    var sp = s.split(':').map(Number);
    var diff = Math.abs((sp[0] * 60 + sp[1]) - tMin);
    if (diff < bestDiff) { bestDiff = diff; best = s; }
  });
  return best;
}
function migrateOldSchedule(slots) {
  var attendance = {};
  try {
    var raw = safeStorage.getItem(OLD_SCHEDULE_KEY);
    if (!raw) return attendance;
    var parsed = JSON.parse(raw);
    Object.keys(parsed).forEach(function (key) {
      var v = parsed[key];
      if (!v || typeof v !== 'object' || v.cancelled) return;
      var parts = key.split('|');
      var name = parts[0], isoDate = parts[1];
      if (NAMES.indexOf(name) === -1 || !v.time) return;
      var slot = nearestSlot(v.time, slots);
      attendance[attendKey(isoDate, slot, name)] = true;
    });
  } catch (e) { /* ignore malformed legacy data */ }
  return attendance;
}
function saveAttendance(attendance) { safeStorage.setItem(ATTEND_KEY, JSON.stringify(attendance)); }
function loadAttendance(slots) {
  var raw = safeStorage.getItem(ATTEND_KEY);
  if (raw !== null) {
    try {
      var parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') return parsed;
    } catch (e) { /* fall through */ }
    return {};
  }
  var migrated = migrateOldSchedule(slots);
  saveAttendance(migrated);
  return migrated;
}

// -- Calendar helpers (Monday-start weeks) --
function parseISODate(iso) {
  var parts = iso.split('-').map(Number);
  return new Date(parts[0], parts[1] - 1, parts[2]);
}
function formatISODate(date) {
  return date.getFullYear() + '-' + pad(date.getMonth() + 1) + '-' + pad(date.getDate());
}
function addDays(date, days) {
  var next = new Date(date);
  next.setDate(next.getDate() + days);
  return next;
}
function shortDateLabel(iso) {
  var date = parseISODate(iso);
  return pad(date.getDate()) + '/' + pad(date.getMonth() + 1);
}
function monthKeyOf(iso) { return iso.slice(0, 7); }
function prevMonthKey(monthKey) {
  var parts = monthKey.split('-').map(Number);
  var year = parts[0], month = parts[1] - 1;
  if (month === 0) { month = 12; year -= 1; }
  return year + '-' + pad(month);
}
function nextMonthKey(monthKey) {
  var parts = monthKey.split('-').map(Number);
  var year = parts[0], month = parts[1] + 1;
  if (month === 13) { month = 1; year += 1; }
  return year + '-' + pad(month);
}
function monthLabel(monthKey) {
  var parts = monthKey.split('-').map(Number);
  return MONTH_NAMES[parts[1] - 1] + ' ' + parts[0];
}
function countAttendance(name, monthKey) {
  var count = 0;
  Object.keys(state.attendance).forEach(function (key) {
    if (!state.attendance[key]) return;
    var parts = key.split('|');
    if (parts[2] !== name) return;
    if (monthKeyOf(parts[0]) !== monthKey) return;
    count++;
  });
  return count;
}
function formatMoney(n) {
  var s = n.toFixed(2);
  return s.replace(/\.00$/, '');
}

// -- Athens time (offline-safe: uses the JS engine's built-in ICU tz data) --
var athensTimeFormatter = new Intl.DateTimeFormat('en-GB', {
  timeZone: 'Europe/Athens', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
});
var athensDateFormatter = new Intl.DateTimeFormat('en-CA', {
  timeZone: 'Europe/Athens', year: 'numeric', month: '2-digit', day: '2-digit',
});
function currentAthensTime() { return athensTimeFormatter.format(new Date()); }
function currentAthensISODate() { return athensDateFormatter.format(new Date()); }

function athensOffsetMinutes(guessUTCms) {
  var d = new Date(guessUTCms);
  var utc = new Date(d.toLocaleString('en-US', { timeZone: 'UTC' }));
  var athens = new Date(d.toLocaleString('en-US', { timeZone: 'Europe/Athens' }));
  return (athens.getTime() - utc.getTime()) / 60000;
}
function athensWallClockToInstant(isoDate, time) {
  var dp = isoDate.split('-').map(Number);
  var tp = time.split(':').map(Number);
  var guessUTC = Date.UTC(dp[0], dp[1] - 1, dp[2], tp[0], tp[1]);
  var offset = athensOffsetMinutes(guessUTC);
  return new Date(guessUTC - offset * 60000);
}

function isCompleted(isoDate, time, todayISO, nowHHMM) {
  if (isoDate < todayISO) return true;
  if (isoDate > todayISO) return false;
  // Strictly "<" (not "<="): a slot at 13:20 stays blue for the whole
  // 13:20 minute and only turns green once the clock reaches 13:21.
  return time < nowHHMM;
}

// -- Beep (no audio file needed, generated in-browser) --
var audioCtx = null;
function beep(freq, durationMs) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.3, audioCtx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + durationMs / 1000);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + durationMs / 1000);
  } catch (e) { /* audio not available */ }
}
function playReminderSound() { beep(880, 250); setTimeout(function () { beep(880, 250); }, 300); }
function playAlarmSound() {
  var i = 0;
  var iv = setInterval(function () {
    beep(660, 200);
    i++;
    if (i >= 6) clearInterval(iv);
  }, 300);
}

function showToast(text) {
  var toast = document.getElementById('toast');
  toast.textContent = text;
  toast.classList.add('open');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(function () { toast.classList.remove('open'); }, 6000);
}

// -- App state --
var initialSlots = loadSlots();
var state = {
  slots: initialSlots,
  attendance: loadAttendance(initialSlots),
  rates: loadRates(),
  notificationsMuted: loadFlag(NOTIF_MUTE_KEY),
  alarmMuted: loadFlag(ALARM_MUTE_KEY),
  activeTab: 'board', // 'board' | 'payouts' | 'members'
  dayOffset: 0,
  payoutMonthOffset: 0,
  editingRateName: null,
  slotsModalOpen: false,
  newSlotHour: 9,
  newSlotMinute: 0,
  todayISO: currentAthensISODate(),
  nowHHMM: currentAthensTime().slice(0, 5),
};

function toggleAttendance(isoDate, slot, name) {
  var key = attendKey(isoDate, slot, name);
  if (state.attendance[key]) delete state.attendance[key];
  else state.attendance[key] = true;
  saveAttendance(state.attendance);
  render();
}

function tabButton(tab, icon, label) {
  return '<button class="tab-btn' + (state.activeTab === tab ? ' active' : '') + '" data-tab="' + tab + '">' +
    '<span class="tab-icon">' + icon + '</span>' + label + '</button>';
}

function renderBoardTab() {
  var dayISO = formatISODate(addDays(parseISODate(state.todayISO), state.dayOffset));
  var dow = parseISODate(dayISO).getDay();
  var dayLabel = DAY_LABELS[(dow + 6) % 7];
  var dayTag = state.dayOffset === 0 ? 'Today' : (state.dayOffset > 0 ? '+' + state.dayOffset + ' d' : state.dayOffset + ' d');

  var html = '<div class="week-bar">';
  html += '  <button class="week-arrow" id="btnPrevDay">‹</button>';
  html += '  <span class="week-range-text">' + dayTag + '</span>';
  html += '  <span class="week-dates-text">' + dayLabel + ' ' + shortDateLabel(dayISO) + '</span>';
  html += '  <button class="week-arrow" id="btnNextDay">›</button>';
  if (state.dayOffset !== 0) html += '  <button class="week-reset-text" id="btnToday">Today</button>';
  html += '</div>';

  html += '<div class="edit-slots-btn-row"><button class="edit-slots-btn" id="btnManageSlots">✎ Manage Time Slots</button></div>';

  html += '<div class="slot-list">';
  if (state.slots.length === 0) {
    html += '<div style="text-align:center;color:#8e8e93;font-size:12px;padding:20px;">No time slots yet — tap "Manage Time Slots" to add one.</div>';
  }
  state.slots.forEach(function (slot) {
    html += '<div class="slot-row">';
    html += '  <div class="slot-time">' + slot + '</div>';
    html += '  <div class="slot-chips">';
    NAMES.forEach(function (name) {
      var checked = !!state.attendance[attendKey(dayISO, slot, name)];
      var completed = checked && isCompleted(dayISO, slot, state.todayISO, state.nowHHMM);
      var cls = 'chip';
      if (checked && !completed) cls += ' filled';
      if (completed) cls += ' completed';
      html += '<button class="' + cls + '" data-day="' + dayISO + '" data-slot="' + slot + '" data-name="' + name + '">' + name + '</button>';
    });
    html += '  </div>';
    html += '</div>';
  });
  html += '</div>';

  return html;
}

function wireBoardTab() {
  document.getElementById('btnPrevDay').onclick = function () { state.dayOffset--; render(); };
  document.getElementById('btnNextDay').onclick = function () { state.dayOffset++; render(); };
  var btnToday = document.getElementById('btnToday');
  if (btnToday) btnToday.onclick = function () { state.dayOffset = 0; render(); };
  document.getElementById('btnManageSlots').onclick = openSlotsModal;

  Array.prototype.forEach.call(document.querySelectorAll('.chip'), function (chipEl) {
    chipEl.onclick = function () {
      toggleAttendance(chipEl.getAttribute('data-day'), chipEl.getAttribute('data-slot'), chipEl.getAttribute('data-name'));
    };
  });
}

function payoutMonthKeyForOffset(offset) {
  var key = monthKeyOf(state.todayISO);
  var i;
  if (offset < 0) { for (i = 0; i > offset; i--) key = prevMonthKey(key); }
  else if (offset > 0) { for (i = 0; i < offset; i++) key = nextMonthKey(key); }
  return key;
}

function renderPayoutsTab() {
  var targetKey = payoutMonthKeyForOffset(state.payoutMonthOffset);
  var monthTag = state.payoutMonthOffset === 0 ? 'This Month' : (state.payoutMonthOffset > 0 ? '+' + state.payoutMonthOffset + ' mo' : state.payoutMonthOffset + ' mo');

  var html = '<div class="week-bar">';
  html += '  <button class="week-arrow" id="btnPrevMonth">‹</button>';
  html += '  <span class="week-range-text">' + monthTag + '</span>';
  html += '  <span class="week-dates-text">' + monthLabel(targetKey) + '</span>';
  html += '  <button class="week-arrow" id="btnNextMonth">›</button>';
  if (state.payoutMonthOffset !== 0) html += '  <button class="week-reset-text" id="btnThisMonth">This Month</button>';
  html += '</div>';

  html += '<div class="payouts-list">';
  NAMES.forEach(function (name) {
    var count = countAttendance(name, targetKey);
    var rate = state.rates[name] || 0;
    var total = count * rate;
    html += '<div class="stats-row">';
    html += '  <div><div class="stats-month">' + name + '</div><div class="stats-tag">' + count + ' session' + (count === 1 ? '' : 's') + ' × €' + rate + '</div></div>';
    html += '  <div class="stats-count"><span class="cur">€</span>' + formatMoney(total) + '</div>';
    html += '</div>';
  });
  html += '</div>';

  return html;
}

function wirePayoutsTab() {
  document.getElementById('btnPrevMonth').onclick = function () { state.payoutMonthOffset--; render(); };
  document.getElementById('btnNextMonth').onclick = function () { state.payoutMonthOffset++; render(); };
  var btnThisMonth = document.getElementById('btnThisMonth');
  if (btnThisMonth) btnThisMonth.onclick = function () { state.payoutMonthOffset = 0; render(); };
}

function renderMembersTab() {
  var html = '<div class="members-list">';
  NAMES.forEach(function (name) {
    var rate = state.rates[name] || 0;
    html += '<div class="stats-row member-row" data-name="' + name + '">';
    html += '  <div><div class="stats-month">' + name + '</div><div class="stats-tag">Tap to edit rate</div></div>';
    html += '  <div class="stats-count"><span class="cur">€</span>' + rate + '</div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function wireMembersTab() {
  Array.prototype.forEach.call(document.querySelectorAll('.member-row'), function (rowEl) {
    rowEl.onclick = function () { openRateModal(rowEl.getAttribute('data-name')); };
  });
}

function render() {
  var app = document.getElementById('app');

  var html = '';
  if (!safeStorage.isPersistent) {
    html += '<div class="storage-warning">⚠️ Storage is blocked on this page — data will NOT be saved after you close the app.</div>';
  }
  html += '<div class="top-bar">';
  html += '  <div class="clock-box"><div class="clock-text">' + currentAthensTime() + '</div><div class="clock-label">Athens</div></div>';
  html += '  <div class="top-bar-buttons">';
  html += '    <button class="icon-btn' + (state.notificationsMuted ? ' muted' : '') + '" id="btnNotif">' + (state.notificationsMuted ? '🔕' : '🔔') + '</button>';
  html += '    <button class="icon-btn' + (state.alarmMuted ? ' muted' : '') + '" id="btnAlarm">' + (state.alarmMuted ? '⏰🚫' : '⏰') + '</button>';
  html += '  </div>';
  html += '</div>';

  html += '<div class="title">GymFlow</div>';

  html += '<div class="tab-content">';
  if (state.activeTab === 'board') html += renderBoardTab();
  else if (state.activeTab === 'payouts') html += renderPayoutsTab();
  else html += renderMembersTab();
  html += '</div>';

  html += '<div class="tab-bar">';
  html += tabButton('board', '📅', 'Board');
  html += tabButton('payouts', '💶', 'Payouts');
  html += tabButton('members', '👥', 'Members');
  html += '</div>';

  html += '<div class="build-version">build ' + BUILD_VERSION_LABEL + '</div>';

  app.innerHTML = html;

  document.getElementById('btnNotif').onclick = function () {
    state.notificationsMuted = !state.notificationsMuted;
    saveFlag(NOTIF_MUTE_KEY, state.notificationsMuted);
    render();
  };
  document.getElementById('btnAlarm').onclick = function () {
    state.alarmMuted = !state.alarmMuted;
    saveFlag(ALARM_MUTE_KEY, state.alarmMuted);
    render();
  };

  Array.prototype.forEach.call(document.querySelectorAll('.tab-btn'), function (btn) {
    btn.onclick = function () { state.activeTab = btn.getAttribute('data-tab'); render(); };
  });

  if (state.activeTab === 'board') wireBoardTab();
  else if (state.activeTab === 'payouts') wirePayoutsTab();
  else wireMembersTab();
}

function openRateModal(name) {
  state.editingRateName = name;
  renderRateModal();
}
function closeRateModal() {
  state.editingRateName = null;
  document.getElementById('modalOverlay').classList.remove('open');
  render();
}
function renderRateModal() {
  var overlay = document.getElementById('modalOverlay');
  var card = document.getElementById('modalCard');
  var name = state.editingRateName;
  if (!name) { overlay.classList.remove('open'); return; }

  var rate = state.rates[name] || 0;
  var html = '<div class="modal-title">' + name + ' · Rate per Session</div>';
  html += '<div class="rate-input-row"><span class="rate-euro">€</span><input type="number" id="rateInput" inputmode="decimal" step="0.5" min="0" value="' + rate + '" /></div>';
  html += '<div class="modal-buttons"><button class="btn-text" id="btnRateClose">Close</button><button class="btn-primary" id="btnRateSave">Save</button></div>';

  card.innerHTML = html;
  overlay.classList.add('open');

  document.getElementById('btnRateClose').onclick = closeRateModal;
  document.getElementById('btnRateSave').onclick = function () {
    var val = parseFloat(document.getElementById('rateInput').value);
    if (isNaN(val) || val < 0) val = 0;
    state.rates[name] = val;
    saveRates(state.rates);
    closeRateModal();
  };
}

function openSlotsModal() {
  state.slotsModalOpen = true;
  state.newSlotHour = 9;
  state.newSlotMinute = 0;
  renderSlotsModal();
}
function closeSlotsModal() {
  state.slotsModalOpen = false;
  document.getElementById('modalOverlay').classList.remove('open');
  render();
}
function renderSlotsModal() {
  var overlay = document.getElementById('modalOverlay');
  var card = document.getElementById('modalCard');
  if (!state.slotsModalOpen) { overlay.classList.remove('open'); return; }

  var html = '<div class="modal-title">Manage Time Slots</div>';
  html += '<div class="slots-manage-list">';
  state.slots.forEach(function (slot) {
    html += '<div class="slots-manage-row"><span class="slots-manage-time">' + slot + '</span><button class="slots-remove-btn" data-slot="' + slot + '">×</button></div>';
  });
  html += '</div>';
  html += '<div class="slots-add-row">';
  html += '  <select id="newSlotHour">';
  for (var h = 0; h < 24; h++) html += '<option value="' + h + '"' + (h === state.newSlotHour ? ' selected' : '') + '>' + pad(h) + '</option>';
  html += '  </select>';
  html += '  <span class="colon">:</span>';
  html += '  <select id="newSlotMinute">';
  for (var m = 0; m < 60; m += 5) html += '<option value="' + m + '"' + (m === state.newSlotMinute ? ' selected' : '') + '>' + pad(m) + '</option>';
  html += '  </select>';
  html += '  <button class="btn-primary" id="btnAddSlot">Add</button>';
  html += '</div>';
  html += '<div class="modal-buttons" style="justify-content:center;margin-top:12px;"><button class="btn-text" id="btnSlotsClose">Close</button></div>';

  card.innerHTML = html;
  overlay.classList.add('open');

  document.getElementById('btnSlotsClose').onclick = closeSlotsModal;

  Array.prototype.forEach.call(document.querySelectorAll('.slots-remove-btn'), function (btn) {
    btn.onclick = function () {
      var slot = btn.getAttribute('data-slot');
      state.slots = state.slots.filter(function (s) { return s !== slot; });
      saveSlots(state.slots);
      renderSlotsModal();
    };
  });

  document.getElementById('btnAddSlot').onclick = function () {
    state.newSlotHour = parseInt(document.getElementById('newSlotHour').value, 10);
    state.newSlotMinute = parseInt(document.getElementById('newSlotMinute').value, 10);
    var slot = pad(state.newSlotHour) + ':' + pad(state.newSlotMinute);
    if (state.slots.indexOf(slot) === -1) {
      state.slots.push(slot);
      state.slots.sort();
      saveSlots(state.slots);
    }
    renderSlotsModal();
  };
}

document.getElementById('modalOverlay').onclick = function (e) {
  if (e.target.id !== 'modalOverlay') return;
  if (state.editingRateName) closeRateModal();
  if (state.slotsModalOpen) closeSlotsModal();
};

// -- In-app reminder/alarm loop --
// NOTE: this can only fire while the app is actually open on screen. iOS does not
// allow real background/lock-screen notifications for a page loaded from a local
// file (file://) — that needs a proper https/local-network server, which this
// version intentionally does not use.
function checkReminders() {
  var fired = loadFiredSet();
  var now = Date.now();
  var changed = false;

  Object.keys(state.attendance).forEach(function (key) {
    if (!state.attendance[key]) return;
    var parts = key.split('|');
    var isoDate = parts[0], slot = parts[1], name = parts[2];
    var target = athensWallClockToInstant(isoDate, slot).getTime();

    var reminderId = key + '|reminder';
    var alarmId = key + '|alarm';
    var reminderAt = target - 10 * 60000;

    if (!state.notificationsMuted && !fired.has(reminderId) && now >= reminderAt && now < target) {
      fired.add(reminderId);
      changed = true;
      showToast(name + ' in 10 min — ' + slot);
      playReminderSound();
    }
    if (!state.alarmMuted && !fired.has(alarmId) && now >= target && now < target + 60000) {
      fired.add(alarmId);
      changed = true;
      showToast('⏰ ' + name + "'s appointment now (" + slot + ')');
      playAlarmSound();
    }
  });

  if (changed) saveFiredSet(fired);
}

setInterval(function () {
  state.todayISO = currentAthensISODate();
  state.nowHHMM = currentAthensTime().slice(0, 5);
  checkReminders();
  // Re-render the clock + any blue->green transitions without losing modal state.
  if (!state.editingRateName && !state.slotsModalOpen) render();
  else {
    var clockEl = document.querySelector('.clock-text');
    if (clockEl) clockEl.textContent = currentAthensTime();
  }
}, 1000);

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission().catch(function () {});
}

render();

// -- Service worker: makes reopening the installed app pick up new deploys
// automatically instead of getting stuck on a stale cached copy. --
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js?v={{BUILD_VERSION}}').then(function (reg) {
      reg.update();
    }).catch(function () { /* ignore */ });

    var refreshed = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (refreshed) return;
      refreshed = true;
      window.location.reload();
    });
  });

  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible' && navigator.serviceWorker.controller) {
      navigator.serviceWorker.getRegistration().then(function (reg) {
        if (reg) reg.update();
      });
    }
  });
}
</script>
</body>
</html>
